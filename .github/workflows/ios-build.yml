name: iOS Build

# Full build workflow that produces signed IPA for TestFlight
# Note: GoogleService-Info.plist is created from template before building

on:
  push:
    branches:
      - main
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'ios/**'
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

env:
  TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

jobs:
  build:
    name: Build & Archive
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 30
    outputs:
      build_number: ${{ steps.version.outputs.build }}
      version: ${{ steps.version.outputs.version }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup GoogleService-Info.plist
      run: |
        sed 's/GOOGLE_API_KEY_PLACEHOLDER/${{ secrets.GOOGLE_API_KEY }}/' \
          ios/Footprint/GoogleService-Info.plist.template > \
          ios/Footprint/GoogleService-Info.plist

    - name: Select Xcode
      run: |
        # Find and select Xcode (prefer Xcode 26.x, fall back to latest)
        XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
        if [ -z "$XCODE_PATH" ]; then
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
        fi
        if [ -z "$XCODE_PATH" ]; then
          XCODE_PATH="/Applications/Xcode.app"
        fi

        if [ -d "$XCODE_PATH" ]; then
          echo "Using Xcode: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer" || true
        else
          echo "Using default Xcode"
        fi
        xcodebuild -version

    - name: Install XcodeGen
      run: which xcodegen || brew install xcodegen

    - name: Generate Xcode project
      run: |
        cd ios
        xcodegen generate

    - name: Resolve Swift Package Dependencies
      run: |
        xcodebuild -resolvePackageDependencies \
          -project ios/Footprint.xcodeproj \
          -scheme Footprint

    - name: Calculate build number
      id: version
      run: |
        BUILD=$(git rev-list --count HEAD)
        PLIST="ios/Footprint/Info.plist"
        VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST" 2>/dev/null || echo "1.0.0")

        # Update build number
        /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" "$PLIST" 2>/dev/null || \
        /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $BUILD" "$PLIST"

        # Also update widget Info.plist if it exists
        WIDGET_PLIST="ios/FootprintWidget/Info.plist"
        if [ -f "$WIDGET_PLIST" ]; then
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" "$WIDGET_PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$WIDGET_PLIST" 2>/dev/null || true
        fi

        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "build=$BUILD" >> $GITHUB_OUTPUT
        echo "Building version $VERSION ($BUILD)"

    - name: Setup App Store Connect API Key
      if: github.event_name != 'pull_request'
      run: |
        mkdir -p $RUNNER_TEMP/private_keys
        echo "${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}" | tr -d '\r' > $RUNNER_TEMP/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8
        chmod 600 $RUNNER_TEMP/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8

    - name: Build (PR - no signing)
      if: github.event_name == 'pull_request'
      run: |
        xcodebuild build \
          -project ios/Footprint.xcodeproj \
          -scheme Footprint \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          CODE_SIGNING_ALLOWED=NO

    - name: Setup signing certificate
      if: github.event_name != 'pull_request'
      env:
        ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        ASC_KEY_PATH: ${{ runner.temp }}/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8
      run: |
        # Create a dev cert via ASC API and import into a temp keychain.
        # Self-hosted runners have a locked login keychain, so Xcode's
        # -allowProvisioningUpdates can't create certs there. We generate
        # our own CSR, submit it to ASC, and import the resulting cert
        # with its private key into an unlocked temp keychain.
        pip3 install -q --break-system-packages PyJWT

        python3 << 'CERT_SCRIPT'
        import jwt, json, time, os, urllib.request, ssl, subprocess, base64

        key_id = os.environ["ASC_KEY_ID"]
        issuer_id = os.environ["ASC_ISSUER_ID"]
        key_path = os.environ["ASC_KEY_PATH"]
        runner_temp = os.environ["RUNNER_TEMP"]

        with open(key_path, "r") as f:
            private_key = f.read()

        now = int(time.time())
        payload = {"iss": issuer_id, "iat": now, "exp": now + 1200, "aud": "appstoreconnect-v1"}
        token = jwt.encode(payload, private_key, algorithm="ES256", headers={"kid": key_id})

        headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
        ctx = ssl.create_default_context()

        def api_get(path):
            req = urllib.request.Request(f"https://api.appstoreconnect.apple.com/v1/{path}", headers=headers)
            with urllib.request.urlopen(req, context=ctx) as resp:
                return json.loads(resp.read())

        def api_post(path, data):
            body = json.dumps(data).encode()
            req = urllib.request.Request(f"https://api.appstoreconnect.apple.com/v1/{path}",
                                         data=body, headers=headers, method="POST")
            with urllib.request.urlopen(req, context=ctx) as resp:
                return json.loads(resp.read())

        def api_delete(path):
            req = urllib.request.Request(f"https://api.appstoreconnect.apple.com/v1/{path}",
                                         headers=headers, method="DELETE")
            urllib.request.urlopen(req, context=ctx)

        # Revoke ALL existing dev certs (they're orphaned — no private key in keychain)
        data = api_get("certificates?limit=200")
        certs = data.get("data", [])
        dev_certs = [c for c in certs if c["attributes"]["certificateType"] == "DEVELOPMENT"]
        dist_certs = [c for c in certs if c["attributes"]["certificateType"] in ("DISTRIBUTION", "IOS_DISTRIBUTION")]
        print(f"Found {len(dev_certs)} dev certs, {len(dist_certs)} dist certs")

        for cert in dev_certs:
            name = cert["attributes"].get("name", "unknown")
            print(f"Revoking dev cert: {name} ({cert['id']})")
            try:
                api_delete(f"certificates/{cert['id']}")
            except Exception as e:
                print(f"  Warning: {e}")

        for cert in dist_certs[2:]:
            name = cert["attributes"].get("name", "unknown")
            print(f"Revoking dist cert: {name} ({cert['id']})")
            try:
                api_delete(f"certificates/{cert['id']}")
            except Exception as e:
                print(f"  Warning: {e}")

        # Generate a private key and CSR
        key_file = f"{runner_temp}/dev.key"
        csr_file = f"{runner_temp}/dev.csr"
        subprocess.run(["openssl", "req", "-new", "-newkey", "rsa:2048", "-nodes",
                        "-keyout", key_file, "-out", csr_file,
                        "-subj", "/CN=Apple Development"], check=True,
                       capture_output=True)

        with open(csr_file, "r") as f:
            csr_content = f.read()
        csr_b64 = base64.b64encode(csr_content.encode()).decode()

        # Create dev cert via ASC API
        cert_data = api_post("certificates", {
            "data": {
                "type": "certificates",
                "attributes": {
                    "certificateType": "DEVELOPMENT",
                    "csrContent": csr_content
                }
            }
        })
        cert_content = cert_data["data"]["attributes"]["certificateContent"]
        cert_id = cert_data["data"]["id"]
        print(f"Created dev cert: {cert_id}")

        # Write cert as DER, convert to PEM
        cert_der = base64.b64decode(cert_content)
        der_file = f"{runner_temp}/dev.cer"
        pem_file = f"{runner_temp}/dev.pem"
        p12_file = f"{runner_temp}/dev.p12"

        with open(der_file, "wb") as f:
            f.write(cert_der)

        subprocess.run(["openssl", "x509", "-inform", "DER", "-in", der_file,
                        "-out", pem_file], check=True, capture_output=True)

        # Create .p12 with the private key + cert
        subprocess.run(["openssl", "pkcs12", "-export", "-legacy",
                        "-inkey", key_file, "-in", pem_file,
                        "-out", p12_file, "-passout", "pass:build"],
                       check=True, capture_output=True)

        print("Created .p12 signing certificate")
        CERT_SCRIPT

        # Create a temporary keychain and import the .p12
        KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
        KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

        security import $RUNNER_TEMP/dev.p12 \
          -P "build" \
          -A -t cert -f pkcs12 \
          -k "$KEYCHAIN_PATH"

        security set-key-partition-list -S apple-tool:,apple:,codesign: \
          -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

        # Prepend temp keychain so it's found first; also purge stale certs from login
        security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

        # Remove stale "Created via API" certs from login keychain
        while security find-certificate -c "Apple Development: Created via API" ~/Library/Keychains/login.keychain-db > /dev/null 2>&1; do
          security delete-certificate -c "Apple Development: Created via API" ~/Library/Keychains/login.keychain-db 2>/dev/null || break
        done

        echo "SIGNING_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
        echo "Signing certificate imported into temporary keychain"
        rm -f $RUNNER_TEMP/dev.key $RUNNER_TEMP/dev.csr $RUNNER_TEMP/dev.cer $RUNNER_TEMP/dev.pem $RUNNER_TEMP/dev.p12

    - name: Archive app
      if: github.event_name != 'pull_request'
      run: |
        xcodebuild archive \
          -project ios/Footprint.xcodeproj \
          -scheme Footprint \
          -configuration Release \
          -archivePath $RUNNER_TEMP/Export/App.xcarchive \
          -destination 'generic/platform=iOS' \
          -allowProvisioningUpdates \
          -authenticationKeyPath $RUNNER_TEMP/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8 \
          -authenticationKeyID ${{ secrets.APP_STORE_CONNECT_KEY_ID }} \
          -authenticationKeyIssuerID ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }} \
          CODE_SIGN_STYLE=Automatic \
          DEVELOPMENT_TEAM=${{ env.TEAM_ID }}

    - name: Create ExportOptions.plist
      if: github.event_name != 'pull_request'
      run: |
        cat > /tmp/ExportOptions.plist << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ env.TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadSymbols</key>
            <true/>
            <key>destination</key>
            <string>export</string>
        </dict>
        </plist>
        EOF

    - name: Export IPA
      if: github.event_name != 'pull_request'
      run: |
        xcodebuild -exportArchive \
          -archivePath $RUNNER_TEMP/Export/App.xcarchive \
          -exportPath $RUNNER_TEMP/Export \
          -exportOptionsPlist /tmp/ExportOptions.plist \
          -allowProvisioningUpdates \
          -authenticationKeyPath $RUNNER_TEMP/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8 \
          -authenticationKeyID ${{ secrets.APP_STORE_CONNECT_KEY_ID }} \
          -authenticationKeyIssuerID ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}

    - name: Upload IPA artifact
      if: github.event_name != 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: ipa-${{ steps.version.outputs.version }}-${{ steps.version.outputs.build }}
        path: |
          ${{ runner.temp }}/Export/*.ipa
          ${{ runner.temp }}/Export/App.xcarchive/dSYMs
        retention-days: 30

    - name: Summary
      run: |
        echo "## Build Successful" >> $GITHUB_STEP_SUMMARY
        echo "- **Version**: ${{ steps.version.outputs.version }} (${{ steps.version.outputs.build }})" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        if [ "${{ github.event_name }}" != "pull_request" ]; then
          echo "- **Artifact**: ipa-${{ steps.version.outputs.version }}-${{ steps.version.outputs.build }}" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Cleanup
      if: always()
      run: |
        if [ -n "$SIGNING_KEYCHAIN_PATH" ] && [ -f "$SIGNING_KEYCHAIN_PATH" ]; then
          security delete-keychain "$SIGNING_KEYCHAIN_PATH" 2>/dev/null || true
        fi
        rm -rf $RUNNER_TEMP/private_keys $RUNNER_TEMP/Export
